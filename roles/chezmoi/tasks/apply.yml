---
- name: Check chezmoi status
  ansible.builtin.command: chezmoi status
  register: chezmoi_status
  changed_when: false
  failed_when: false

- name: Apply chezmoi
  ansible.builtin.command: chezmoi apply
  when: chezmoi_status.stdout | length > 0
  changed_when: chezmoi_status.stdout | length > 0
