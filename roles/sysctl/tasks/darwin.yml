---
- name: Read current sysctl value (macOS)
  ansible.builtin.command:
    argv:
      - sysctl
      - -n
      - "{{ item.key }}"
  loop: "{{ sysctl_settings | dict2items }}"
  register: sysctl_current
  changed_when: false
  become: true
  tags: [config]

- name: Apply sysctl settings (macOS)
  ansible.builtin.command:
    argv:
      - sysctl
      - -w
      - "{{ item.item.key }}={{ item.item.value }}"
  loop: "{{ sysctl_current.results }}"
  when: item.stdout | trim != item.item.value | string
  changed_when: true
  become: true
  tags: [config]
