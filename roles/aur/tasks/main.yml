---
- name: Check if paru is installed
  ansible.builtin.command: which paru
  register: aur_paru_check
  changed_when: false
  failed_when: false

- name: Install paru
  when: aur_paru_check.rc != 0
  block:
    - name: Clone paru-bin
      ansible.builtin.git: # noqa: latest[git]
        repo: https://aur.archlinux.org/paru-bin.git
        dest: /tmp/paru-bin
        depth: 1

    - name: Build and install paru
      ansible.builtin.command: makepkg -si --noconfirm
      args:
        chdir: /tmp/paru-bin

    - name: Clean up paru build dir
      ansible.builtin.file:
        path: /tmp/paru-bin
        state: absent

- name: Install AUR packages
  ansible.builtin.command: "paru -S --noconfirm --needed {{ item }}"
  loop: "{{ ws_aur_packages }}"
  register: aur_result
  changed_when: "'there is nothing to do' not in aur_result.stdout"
  tags: [install]
