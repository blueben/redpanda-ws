---
- name: Ensure systemd user directory exists
  ansible.builtin.file:
    path: "{{ ws_home }}/.config/systemd/user"
    state: directory
    mode: "0755"

- name: Deploy atuin sync service unit
  ansible.builtin.template:
    src: atuin-sync.service.j2
    dest: "{{ ws_home }}/.config/systemd/user/atuin-sync.service"
    mode: "0644"
  notify: Restart atuin sync

- name: Deploy atuin sync timer unit
  ansible.builtin.copy:
    src: atuin-sync.timer
    dest: "{{ ws_home }}/.config/systemd/user/atuin-sync.timer"
    mode: "0644"
  notify: Restart atuin sync

- name: Reload systemd user daemon
  ansible.builtin.systemd_service:
    daemon_reload: true
    scope: user

- name: Enable and start atuin sync timer
  ansible.builtin.systemd_service:
    name: atuin-sync.timer
    enabled: true
    state: started
    scope: user
