---
- name: Download atuin install script
  ansible.builtin.get_url:
    url: https://setup.atuin.sh
    dest: /tmp/atuin-install.sh
    mode: "0755"
  when: not ansible_check_mode

- name: Install atuin via official script
  ansible.builtin.command: bash /tmp/atuin-install.sh
  args:
    creates: "{{ ws_home }}/.atuin/bin/atuin"

- name: Clean up atuin install script
  ansible.builtin.file:
    path: /tmp/atuin-install.sh
    state: absent
