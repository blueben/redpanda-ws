---
- name: Ensure LaunchAgents directory exists
  file:
    path: "{{ ws_home }}/Library/LaunchAgents"
    state: directory
    mode: "0755"

- name: Deploy atuin sync plist
  copy:
    src: atuin-sync.plist
    dest: "{{ ws_home }}/Library/LaunchAgents/com.atuin.sync.plist"
    mode: "0644"
  notify: restart atuin sync

- name: Load atuin sync launch agent
  community.general.launchd:
    name: com.atuin.sync
    state: started
    enabled: true
