---
- name: Ensure atuin config directory exists
  ansible.builtin.file:
    path: "{{ ws_home }}/.config/atuin"
    state: directory
    mode: "0755"

- name: Deploy atuin config
  ansible.builtin.template:
    src: config.toml.j2
    dest: "{{ ws_home }}/.config/atuin/config.toml"
    mode: "0644"
  notify: Restart atuin sync
