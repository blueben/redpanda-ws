---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Install Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint

      - name: Ansible syntax check
        run: ansible-playbook site.yml --syntax-check

  arch-dry-run:
    name: Arch Linux Dry Run
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize pacman and install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm ansible git python sudo

      - name: Install Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create non-root CI user
        run: |
          useradd -m ciuser
          echo "ciuser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Run playbook in check mode
        run: |
          su - ciuser -c "
            cd $GITHUB_WORKSPACE && \
            ansible-playbook site.yml \
              --check --diff \
              --skip-tags sysctl,chezmoi,services \
              -e '{\"ws_aur_packages\":[]}'
          "

  redhat-dry-run:
    name: RedHat Dry Run
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y ansible git python3 python3-libdnf5 sudo

      - name: Install Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create non-root CI user
        run: |
          useradd -m ciuser
          echo "ciuser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Run playbook in check mode
        run: |
          su - ciuser -c "
            cd $GITHUB_WORKSPACE && \
            ansible-playbook site.yml \
              --check --diff \
              --skip-tags sysctl,chezmoi,atuin,services
          "

  debian-dry-run:
    name: Debian Dry Run
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: ubuntu:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y ansible git python3 python3-apt sudo

      - name: Install Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create non-root CI user
        run: |
          useradd -m ciuser
          echo "ciuser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Run playbook in check mode
        run: |
          su - ciuser -c "
            cd $GITHUB_WORKSPACE && \
            ansible-playbook site.yml \
              --check --diff \
              --skip-tags sysctl,chezmoi,atuin,services
          "
