---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Install Galaxy collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint

      - name: Ansible syntax check
        run: ansible-playbook site.yml --syntax-check

  arch-dry-run:
    name: Arch Linux Dry Run
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Bootstrap system
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm sudo
          useradd -m ciuser
          echo "ciuser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su - ciuser -c "
            cd $GITHUB_WORKSPACE && \
            ./bootstrap.sh --no-ask-pass \
              --check --diff \
              --skip-tags sysctl,chezmoi,services \
              -e '{\"ws_aur_packages\":[]}'
          "

  redhat-dry-run:
    name: RedHat Dry Run
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install check-mode dependency
        run: dnf install -y sudo python3-libdnf5

      - name: Bootstrap system
        run: |
          useradd -m ciuser
          echo "ciuser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su - ciuser -c "
            cd $GITHUB_WORKSPACE && \
            ./bootstrap.sh --no-ask-pass \
              --check --diff \
              --skip-tags sysctl,chezmoi,atuin,services
          "

  debian-dry-run:
    name: Debian Dry Run
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: ubuntu:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install check-mode dependency
        run: |
          apt-get update
          apt-get install -y sudo python3-apt

      - name: Bootstrap system
        run: |
          useradd -m ciuser
          echo "ciuser ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su - ciuser -c "
            cd $GITHUB_WORKSPACE && \
            ./bootstrap.sh --no-ask-pass \
              --check --diff \
              --skip-tags sysctl,chezmoi,atuin,services
          "
